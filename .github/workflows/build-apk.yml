name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate native Android project
        working-directory: artifacts/phone-guard
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Make gradlew executable
        working-directory: artifacts/phone-guard/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: artifacts/phone-guard/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhoneGuard-APK
          path: artifacts/phone-guard/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Print download instructions
        run: |
          echo ""
          echo "================================================"
          echo " BUILD COMPLETE!"
          echo " Download: Actions tab > this run > Artifacts"
          echo " File: PhoneGuard-APK.zip (contains the .apk)"
          echo "================================================"

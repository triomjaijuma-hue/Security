name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install all workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Initialize EAS project
        working-directory: artifacts/phone-guard
        run: eas init --non-interactive || true

      - name: Build APK
        working-directory: artifacts/phone-guard
        run: eas build --platform android --profile apk --non-interactive --wait

      - name: Print download instructions
        if: always()
        run: |
          echo ""
          echo "================================================"
          echo " Download your APK from: https://expo.dev"
          echo " Go to: Your Project > Builds > Download APK"
          echo "================================================"
